name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Must already exist."
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout at tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: bun test

      - name: Verify package versions match tag
        run: |
          VERSION="${RELEASE_TAG#v}"
          SDK_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Tag version: ${VERSION}"
          echo "SDK version: ${SDK_VERSION}"
          echo "CLI version: ${CLI_VERSION}"
          if [ "${SDK_VERSION}" != "${VERSION}" ]; then
            echo "::error::SDK version (${SDK_VERSION}) does not match tag (${VERSION})"
            exit 1
          fi
          if [ "${CLI_VERSION}" != "${VERSION}" ]; then
            echo "::error::CLI version (${CLI_VERSION}) does not match tag (${VERSION})"
            exit 1
          fi

      - name: Publish googlehealth (SDK)
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm publish --access public --no-git-checks --provenance

      - name: Publish googlehealth-cli
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm publish --access public --no-git-checks --provenance

      - name: Build combined release notes
        id: notes
        run: |
          VERSION="${RELEASE_TAG#v}"
          {
            echo "## googlehealth"
            echo
            awk -v v="${VERSION}" '
              $0 ~ "^## \\["v"\\]" { flag=1; next }
              /^## \[/ { flag=0 }
              flag { print }
            ' packages/sdk/CHANGELOG.md
            echo
            echo "## googlehealth-cli"
            echo
            awk -v v="${VERSION}" '
              $0 ~ "^## \\["v"\\]" { flag=1; next }
              /^## \[/ { flag=0 }
              flag { print }
            ' packages/cli/CHANGELOG.md
          } > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${RELEASE_TAG}" > /tmp/release-notes.md
          fi

          echo "Release notes preview:"
          echo "--------------------------------"
          cat /tmp/release-notes.md
          echo "--------------------------------"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            --verify-tag \
            2>/dev/null || \
          gh release edit "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md
